#-----------------------------------------
# CloudBuild Pipeline for Staging CloudRun
#-----------------------------------------
steps:
  # Docker Build Image
  - name: 'gcr.io/cloud-builders/docker'
    id: BUILD
    args: ['build', '-t', '$_SERVICE_IMAGE', '.', '-f', 'Dockerfile']

  # Docker Push Image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: PUSH
    args: ['push', '$_SERVICE_IMAGE']

  # Docker Deploy image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: DEPLOY
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--project=$_SERVICE_PROJECT'
      - '--region=$_SERVICE_REGION'
      - '--image=$_SERVICE_IMAGE'

options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

images:
  - '$_SERVICE_IMAGE'

substitutions:
    _SERVICE_IMAGE    : me-west1-docker.pkg.dev/my-project-staging-492518/${_DOCKER_REGISTRY}/${_DOCKER_IMAGENAME}:${SHORT_SHA}
    _SERVICE_REGION   : me-west1
    _SERVICE_PROJECT  : my-project-staging-492518
    _SERVICE_NAME     : my-docker-app-staging
    _DOCKER_REGISTRY  : alisher-docker-repo
    _DOCKER_IMAGENAME : myapp-staging
